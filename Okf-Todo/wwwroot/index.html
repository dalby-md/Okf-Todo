<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKF-Todo</title>
    <link rel="stylesheet" href="/css/select2.min.css?v=4.0.13">
    <link rel="stylesheet" href="/css/app.css?v=20260719-task-sort-1">
    <link id="dark-theme-stylesheet" rel="stylesheet" href="/css/dark-theme.css?v=20260719-task-sort-1" disabled>
    <script>
      try {
        if (window.localStorage.getItem('okf-todo-color-scheme') === 'DARK') {
          document.documentElement.classList.add('theme-dark')
          document.documentElement.style.colorScheme = 'dark'
          document.getElementById('dark-theme-stylesheet').disabled = false
        }
      } catch {
        // The bridge preference is loaded after startup.
      }
    </script>
  </head>
  <body>
    <div id="app">
      <main class="app-shell">
        <section class="task-editor-panel" aria-labelledby="app-title">
          <header class="app-header">
            <div>
              <p class="eyebrow">Local task system</p>
              <h1 id="app-title">OKF-Todo</h1>
            </div>
          </header>
          <p class="empty-state">Loading tasks...</p>
        </section>
      </main>
    </div>
    <script defer src="/js/jquery.min.js?v=20260707-editor-2"></script>
    <script defer src="/js/select2.min.js?v=4.0.13"></script>
    <script defer src="/js/editor.js?v=20260717-help-markdown-1"></script>
    <script defer src="/js/app.js?v=20260719-task-sort-1"></script>
  </body>
</html>
